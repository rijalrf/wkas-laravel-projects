name: Build, Push, and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wkas-laravel:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wkas-laravel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.SSH_TARGET_DIR }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            cd ${{ secrets.SSH_TARGET_DIR }}
            
            # Export Dockerhub username for docker-compose.prod.yml
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            
            # Pull the latest image from Docker Hub using the production compose file
            docker compose -f docker-compose.prod.yml pull
            
            # Restart the container using the production compose file
            docker compose -f docker-compose.prod.yml up -d
            
            # Run post-deployment Laravel commands
            docker compose -f docker-compose.prod.yml exec -T wkas-app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T wkas-app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T wkas-app php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T wkas-app php artisan view:cache
